# ===============================
# SERVER CONFIG
# ===============================
server.port=8090

# ===============================
# APPLICATION NAME
# ===============================
spring.application.name=ecommerce-order-service

# ===============================
# DATABASE CONFIG (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/orderService?useSSL=false&serverTimezone=UTC
#spring.datasource.url=jdbc:mysql://localhost:3306/orderService
spring.datasource.username=orderServiceUser
#spring.datasource.password=password

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=DEBUG

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# ===============================
# FEIGN CLIENT CONFIG
# ===============================
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000
feign.client.config.default.loggerLevel=basic

# ===============================
# EXTERNAL SERVICES
# ===============================
#cart.service.url=http://localhost:8060
product.service.url=http://localhost:8080
inventory.service.url=http://localhost:8070

# ===============================
# RESILIENCE4J - CIRCUIT BREAKER
# ===============================
resilience4j.circuitbreaker.instances.inventoryService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.inventoryService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.inventoryService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.inventoryService.waitDurationInOpenState=10s

resilience4j.circuitbreaker.instances.cartService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.cartService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.cartService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.cartService.waitDurationInOpenState=10s

# ===============================
# RESILIENCE4J - RETRY
# ===============================
resilience4j.retry.instances.inventoryService.enableExponentialBackoff=true
resilience4j.retry.instances.inventoryService.exponentialBackoffMultiplier=2
resilience4j.retry.instances.inventoryService.maxAttempts=3
resilience4j.retry.instances.inventoryService.waitDuration=200ms

resilience4j.retry.instances.cartService.maxAttempts=3
resilience4j.retry.instances.cartService.waitDuration=500ms

